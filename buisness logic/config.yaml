jobs_skills_csv: "data/job_skills.csv"
jobs_postings_csv: "data/linkedin_job_postings.csv"

# Original raw resumes JSONL
candidates_csv: "data/master_resumes.jsonl"

# Enriched JSONL produced by skill_legitimacy_transformer.py
candidates_enriched_jsonl: "data/master_resumes_with_transformer_skills.jsonl"

# Legitimacy scores CSV produced by skill_legitimacy_transformer.py
candidate_legitimacy_csv: "data/candidate_skill_legitimacy_scores_transformer.csv"

jobs_db:
  backend: "postgres"
  dsn: "host=localhost port=5433 dbname=job_market user=postgres password=changeme"

candidates_db:
  backend: "postgres"
  dsn: "host=localhost port=5433 dbname=candidates user=postgres password=changeme"


llm:
  enabled: true
  provider: gemini
  providers: [gemini, grok]
  model: gemini-2.5-flash-lite
  grok_model: grok-2-1212
  json_mode: false
  safety: default
  # Gemini → Grok fallback; SQL summary if both fail or quota hit
  use_for_summary: true
  use_for_enrichment: false

candidate_legitimacy:
  enabled: true
  filter_min_score: 0.2        
  rescue_min_score: 0.6        
  high_threshold: 0.8
  medium_threshold: 0.5
  low_threshold: 0.3

cluster_expansion:
  enabled: true
  use_role_clusters_for_readiness: true


candidate_readiness_allow_derived_rescue: true

parser:
  prefer_llm: false

feedback:
  enabled: true
  auto_diagnose: true
  diagnosis_provider: auto
  log_path: feedback/failures.jsonl
  # Thumbs up/down on answers — negative ratings escalate to human review queue
  ratings_enabled: true
  ratings_log_path: feedback/ratings.jsonl
  escalate_negative_to_failure: true